<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - ATS CV Builder</title>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      padding:40px 20px;
    }

    .box{
      max-width:700px;
      margin:auto;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    h1{
      margin-bottom:20px;
      color:#1e3a5f;
    }

    input,textarea{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:14px;
    }

    button{
      background:#1e3a5f;
      color:#fff;
      border:none;
      padding:12px 20px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Contact Us</h1>

  <form>
    <input type="text" placeholder="Your Name" required>

    <input type="email" placeholder="Your Email" required>

    <textarea rows="6" placeholder="Your Message"></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>

</body>
</html>
